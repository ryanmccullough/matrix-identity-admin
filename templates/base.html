<!DOCTYPE html>
<html lang="en">
<head>

  <title>{% block title %}Matrix Identity Admin{% endblock %}</title>
  <link rel="stylesheet" href="/static/app.css">
</head>
<body>

    <nav>
      <span class="brand">Matrix Identity Admin</span>
      <div class="nav-links">

  <script src="/static/htmx.min.js"></script>
</body>
</html>
