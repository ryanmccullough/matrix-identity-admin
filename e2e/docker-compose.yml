# E2E test environment — dependencies only.
#
# Run with: docker compose -f e2e/docker-compose.yml up -d
# Then start the app locally: cp e2e/.env .env.e2e && flox activate -- cargo run --env-file .env.e2e
#
# Services exposed on the host:
#   Keycloak  → http://localhost:8081   (admin UI: admin / admin)
#   MAS       → http://localhost:8082
#   Synapse   → http://localhost:8008
#   Mailpit   → http://localhost:8025   (web UI to inspect captured emails)
#   Postgres  → localhost:5432          (internal only — not exposed)
#
# First startup takes ~60s for Keycloak to import the realm and
# MAS to run migrations. Subsequent starts are fast.

services:

  # ── Postgres ────────────────────────────────────────────────────────────────
  # Shared by MAS. Keycloak uses its own embedded H2 in start-dev mode.

  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: mas
      POSTGRES_PASSWORD: mas_password
      POSTGRES_DB: mas
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U mas"]
      interval: 5s
      timeout: 5s
      retries: 10

  # ── Keycloak ─────────────────────────────────────────────────────────────────
  # Runs in dev mode (HTTP only, embedded H2) with the test realm pre-imported.
  #
  # Includes:
  #   - Realm "test"
  #   - OIDC client "matrix-admin-ui"       (for admin app login)
  #   - Service account "matrix-admin-service" (for Keycloak admin API)
  #   - OIDC client "mas-oidc-client"        (for MAS upstream OIDC)
  #   - Realm role "matrix-admin"
  #   - Test user: testadmin / Admin1234!   (has matrix-admin role)

  keycloak:
    image: quay.io/keycloak/keycloak:26.1
    command: start-dev --import-realm
    environment:
      KEYCLOAK_ADMIN: admin
      KEYCLOAK_ADMIN_PASSWORD: admin
      # Disable strict hostname so token endpoints match the request host,
      # allowing both browser (localhost:8081) and server-side calls to work.
      KC_HOSTNAME_STRICT: "false"
      KC_HTTP_ENABLED: "true"
    volumes:
      - ./keycloak-realm.json:/opt/keycloak/data/import/realm.json:ro
    ports:
      - "8081:8080"
    healthcheck:
      # Keycloak's image has no curl/wget. Use bash /dev/tcp — port 8080 only opens
      # after startup completes (realm import included), so this is a reliable signal.
      test: ["CMD-SHELL", "exec 3<>/dev/tcp/127.0.0.1/8080"]
      interval: 10s
      timeout: 5s
      retries: 30
      start_period: 30s

  # ── MAS (Matrix Authentication Service) ──────────────────────────────────────
  # Admin OAuth2 client "matrix-admin-oauth" is configured in mas.yaml.
  # MAS migrations run automatically before the server starts.

  mas:
    image: ghcr.io/element-hq/matrix-authentication-service:0.12.0
    # mas-cli server runs migrations automatically on startup (--no-migrate to skip).
    command: ["server"]
    environment:
      MAS_CONFIG_FILE: /config.yaml
    volumes:
      - ./mas.yaml:/config.yaml:ro
    ports:
      - "8082:8080"
    depends_on:
      postgres:
        condition: service_healthy
      keycloak:
        condition: service_healthy
    # No healthcheck: MAS is a distroless image with no shell or curl.
    # Readiness is polled from the host in CI (see e2e.yml wait step).

  # ── Synapse (Matrix homeserver) ──────────────────────────────────────────────
  # Runs in MSC3861 mode — delegates auth entirely to MAS.
  # Uses SQLite for storage (lightweight, sufficient for e2e).

  synapse:
    image: matrixdotorg/synapse:v1.127.1
    # Run as root so Synapse can write to the named volume (uid 991 can't).
    # Fine for e2e — not for production.
    user: "0:0"
    environment:
      SYNAPSE_CONFIG_DIR: /data
      SYNAPSE_CONFIG_PATH: /data/homeserver.yaml
    volumes:
      - synapse-data:/data
      - ./homeserver.yaml:/data/homeserver.yaml:ro
      - ./synapse-log.config:/data/log.config:ro
      - ./e2e.test.signing.key:/data/e2e.test.signing.key:ro
    ports:
      - "8008:8008"
    depends_on:
      mas:
        condition: service_started
      keycloak:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:8008/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 30
      start_period: 30s

  # ── Mailpit (fake SMTP) ───────────────────────────────────────────────────────
  # Captures all outgoing email so e2e tests can assert invite emails were sent.
  # Keycloak is configured to relay through this server (see keycloak-realm.json).

  mailpit:
    image: axllent/mailpit:latest
    ports:
      - "8025:8025"   # Web UI + REST API
      - "1025:1025"   # SMTP
    # No healthcheck: Mailpit's image is scratch-based with no shell or curl.
    # Readiness is polled from the host in CI (see e2e.yml wait step).

volumes:
  postgres-data:
  synapse-data:
