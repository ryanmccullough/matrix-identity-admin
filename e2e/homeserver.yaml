server_name: "e2e.test"
pid_file: /data/homeserver.pid

listeners:
  - port: 8008
    type: http
    tls: false
    resources:
      - names: [client, federation]
        compress: false

database:
  name: sqlite3
  args:
    database: /data/homeserver.db

signing_key_path: /config/e2e.test.signing.key

log_config: /config/log.config

media_store_path: /data/media_store

suppress_key_server_warning: true
report_stats: false
macaroon_secret_key: "e2e-macaroon-secret-not-real"
form_secret: "e2e-form-secret-not-real"

matrix_authentication_service:
  enabled: true
  endpoint: "http://mas:8080/"
  secret: "e2e-matrix-shared-secret-not-real"

password_config:
  enabled: false
