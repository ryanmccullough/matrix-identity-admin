services:
  app:
    build: .
    ports:
      - "3000:3000"
    volumes:
      - app-data:/app/data
    env_file:
      - .env
    environment:
      # These override anything in .env to ensure correct values inside the container.
      APP_BIND_ADDR: "0.0.0.0:3000"
      DATABASE_URL: "sqlite:///app/data/app.db"
    restart: unless-stopped
    healthcheck:
      # /auth/login is always accessible without a session.
      test: ["CMD", "curl", "-sf", "http://localhost:3000/auth/login"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s

volumes:
  app-data:
