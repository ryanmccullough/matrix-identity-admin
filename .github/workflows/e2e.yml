name: E2E (Nightly)

on:
  schedule:
    # 02:00 UTC every night
    - cron: '0 2 * * *'
  workflow_dispatch:

permissions:
  contents: read

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1

jobs:
  e2e:
    name: E2E integration tests
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - uses: actions/checkout@v6

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo registry and build artifacts
        uses: actions/cache@v5
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-e2e-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-e2e-

      - name: Start e2e Docker stack
        run: docker compose -f e2e/docker-compose.yml up -d

      - name: Wait for all services to become ready
        run: |
          # Poll HTTP endpoints from the runner rather than relying on Docker
          # healthchecks — MAS is distroless and Mailpit is scratch-based, so
          # neither image has curl/shell for in-container health probes.
          wait_for_http() {
            local name=$1 url=$2
            local deadline=$((SECONDS + 300))
            echo "Waiting for $name ($url)..."
            while [ $SECONDS -lt $deadline ]; do
              if curl -sf --max-time 3 -o /dev/null "$url" 2>/dev/null; then
                echo "$name ready (${SECONDS}s)"
                return 0
              fi
              sleep 5
            done
            echo "ERROR: $name did not become ready within 300s"
            docker compose -f e2e/docker-compose.yml logs "$name" 2>/dev/null || true
            return 1
          }

          # Keycloak first — MAS depends on it being up
          wait_for_http keycloak  "http://localhost:8081/realms/test"
          wait_for_http mas       "http://localhost:8082/.well-known/openid-configuration"
          wait_for_http mailpit   "http://localhost:8025/api/v1/messages"
          echo "All services ready."

      - name: Run e2e tests
        run: |
          set -o pipefail
          cargo test --test e2e -- --include-ignored --nocapture 2>&1 | tee e2e-test-output.txt

      - name: Capture Docker compose logs
        if: always()
        run: docker compose -f e2e/docker-compose.yml logs --no-color > e2e-docker-logs.txt 2>&1

      - name: Upload test output
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: e2e-test-output
          path: e2e-test-output.txt
          retention-days: 14

      - name: Upload Docker service logs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: e2e-docker-logs
          path: e2e-docker-logs.txt
          retention-days: 14

      - name: Stop Docker stack
        if: always()
        run: docker compose -f e2e/docker-compose.yml down -v
